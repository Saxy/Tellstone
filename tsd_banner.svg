<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f141c" />
      <stop offset="50%" stop-color="#161f2c" />
      <stop offset="100%" stop-color="#0b0f15" />
    </linearGradient>
    
    <!-- Accent Glow -->
    <radialGradient id="glow" cx="15%" cy="50%" r="40%">
      <stop offset="0%" stop-color="#00d2ff" stop-opacity="0.15" />
      <stop offset="100%" stop-color="#00d2ff" stop-opacity="0" />
    </radialGradient>

    <!-- Tech Grid Pattern -->
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#ffffff" stroke-opacity="0.02" stroke-width="1" />
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="1200" height="400" fill="url(#bgGrad)" />
  <rect width="1200" height="400" fill="url(#grid)" />
  <circle cx="200" cy="200" r="300" fill="url(#glow)" />

  <!-- Logo Placement (Symmetrical Hexagon & Network Hub) -->
  <g transform="translate(110, 100)">
    <!-- Outer Hexagon Shadow / Glow -->
    <polygon points="100,10 180,55 180,145 100,190 20,145 20,55" fill="#0b0f15" stroke="#00d2ff" stroke-opacity="0.3" stroke-width="2" />
    <!-- Inner Hexagon Body -->
    <polygon points="100,20 170,60 170,140 100,180 30,140 30,60" fill="#182232" stroke="#2c3b52" stroke-width="3" />
    
    <!-- Perfectly Symmetrical Circuit / Network Hub Lines -->
    <g stroke="#00d2ff" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" fill="none">
      <circle cx="100" cy="100" r="18" fill="#182232" />
      <circle cx="100" cy="100" r="6" fill="#00d2ff" />
      
      <!-- Top & Bottom -->
      <line x1="100" y1="82" x2="100" y2="40" />
      <circle cx="100" cy="37" r="5" fill="#00d2ff" />
      <line x1="100" y1="118" x2="100" y2="160" />
      <circle cx="100" cy="163" r="5" fill="#00d2ff" />

      <!-- Left & Right -->
      <line x1="82" y1="100" x2="40" y2="100" />
      <circle cx="37" cy="100" r="5" fill="#00d2ff" />
      <line x1="118" y1="100" x2="160" y2="100" />
      <circle cx="163" cy="100" r="5" fill="#00d2ff" />

      <!-- Diagonals (Top-Left / Bottom-Right / Top-Right / Bottom-Left) -->
      <line x1="87" y1="87" x2="58" y2="58" />
      <circle cx="55" cy="55" r="5" fill="#00d2ff" />
      <line x1="113" y1="113" x2="142" y2="142" />
      <circle cx="145" cy="145" r="5" fill="#00d2ff" />

      <line x1="113" y1="87" x2="142" y2="58" />
      <circle cx="145" cy="55" r="5" fill="#00d2ff" />
      <line x1="87" y1="113" x2="58" y2="142" />
      <circle cx="55" cy="145" r="5" fill="#00d2ff" />
    </g>
  </g>

  <!-- Typography Section -->
  <g transform="translate(340, 175)">
    <!-- Title -->
    <text x="0" y="0" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-weight="900" font-size="72" fill="#ffffff" letter-spacing="4">TELLSTONE</text>
    
    <!-- Subtitle / Tagline -->
    <text x="4" y="50" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-weight="600" font-size="20" fill="#00d2ff" letter-spacing="2">ZERO-ALLOCATION IN-MEMORY DATABASE</text>
    
    <!-- Tech specs tags -->
    <g transform="translate(4, 90)">
      <rect x="0" y="0" width="110" height="28" rx="6" fill="#1b2a3d" stroke="#2c3b52" />
      <text x="55" y="18" font-family="monospace" font-size="12" fill="#a0aec0" text-anchor="middle">Go 1.26+</text>

      <rect x="120" y="0" width="110" height="28" rx="6" fill="#1b2a3d" stroke="#2c3b52" />
      <text x="175" y="18" font-family="monospace" font-size="12" fill="#a0aec0" text-anchor="middle">RESP</text>

      <rect x="240" y="0" width="150" height="28" rx="6" fill="#1b2a3d" stroke="#2c3b52" />
      <text x="315" y="18" font-family="monospace" font-size="12" fill="#a0aec0" text-anchor="middle">Linear Scaling</text>
    </g>
  </g>
  
  <!-- Subtle border line -->
  <rect x="0" y="395" width="1200" height="5" fill="#00d2ff" opacity="0.6" />
</svg>
