version: 2

project_name: tellstone

before:
  hooks:
    - go mod tidy

builds:
  - main: ./cmd/tellstone
    binary: tellstone
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X github.com/Saxy/Tellstone/internal/version.Version={{.Version}}
      - -X github.com/Saxy/Tellstone/internal/version.Commit={{.Commit}}
      - -X github.com/Saxy/Tellstone/internal/version.Date={{.Date}}

archives:
  - formats: ["tar.gz"]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats: ["zip"]

checksum:
  name_template: "checksums.txt"
  algorithm: sha256

nfpms:
  - id: tellstone-nfpm
    package_name: tellstone
    vendor: Tellstone
    homepage: https://tellstone.io
    description: "High-performance, cloud-native in-memory key/value store"
    license: Apache-2.0
    maintainer: "Maximilian Hagen <max@tellstone.io>"
    formats:
      - deb
    bindir: /usr/bin
    section: database
    priority: optional

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"
      - "^chore:"

release:
  github:
    owner: Saxy
    name: Tellstone
  draft: false
  prerelease: auto

homebrew_casks:
  - name: tellstone
    repository:
      owner: Saxy
      name: tellstone-tap
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    homepage: https://tellstone.io
    description: "High-performance, cloud-native in-memory key/value store"
    license: "Apache-2.0"
    skip_upload: auto
    binaries:
      - tellstone
    hooks:
      post:
        install: |
          if OS.mac?
            system_command "/usr/bin/xattr", args: ["-dr", "com.apple.quarantine", "#{staged_path}/tellstone"]
          end
    caveats: |
      Tellstone is now installed. Run 'tellstone -h' for usage.
      To start the server: tellstone -addr 127.0.0.1:9988
