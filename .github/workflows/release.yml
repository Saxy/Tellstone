name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

env:
  GO_VERSION: "1.26"

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Run tests
        run: go test ./...

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          version: latest
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HOMEBREW_TAP_TOKEN: ${{ secrets.TAP_TOKEN }}

  publish-deb:
    name: Publish APT package
    needs: release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          repository: Saxy/tellstone-apt
          token: ${{ secrets.APT_REPO_TOKEN }}

      - name: Download .deb from release
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          mkdir -p pool/tellstone
          gh release download "$TAG" -p "*.deb" -D pool/tellstone/ --clobber
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: Saxy/Tellstone

      - name: Install apt tooling
        run: sudo apt-get update && sudo apt-get install -y dpkg-dev apt-utils

      - name: Generate Packages metadata
        run: |
          for ARCH in amd64 arm64; do
            mkdir -p "dists/stable/main/binary-${ARCH}"
            dpkg-scanpackages --arch "${ARCH}" --multiversion pool/ /dev/null \
              > "dists/stable/main/binary-${ARCH}/Packages"
            gzip -9 -k -f "dists/stable/main/binary-${ARCH}/Packages"
          done

      - name: Generate Release file
        run: |
          cd dists/stable
          apt-ftparchive \
            -o APT::FTPArchive::Release::Origin="Tellstone" \
            -o APT::FTPArchive::Release::Label="Tellstone" \
            -o APT::FTPArchive::Release::Suite="stable" \
            -o APT::FTPArchive::Release::Codename="stable" \
            -o APT::FTPArchive::Release::Architectures="amd64 arm64" \
            -o APT::FTPArchive::Release::Components="main" \
            release . > Release

      - name: Sign Release file
        run: |
          echo "${{ secrets.GPG_PRIVATE_KEY }}" | base64 -d | gpg --batch --import
          gpg --batch --yes --pinentry-mode loopback \
            -abs -o dists/stable/Release.gpg dists/stable/Release
          gpg --batch --yes --pinentry-mode loopback \
            --clearsign -o dists/stable/InRelease dists/stable/Release

      - name: Export public key
        run: |
          gpg --batch --pinentry-mode loopback \
            --armor --export > key.gpg

      - name: Push to APT repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet && exit 0
          git commit -m "Release ${GITHUB_REF#refs/tags/}"
          git push
